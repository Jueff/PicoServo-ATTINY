[platformio]
src_dir = src
    
[env]
framework = arduino
build_src_flags = 

[env:PicoServo-Tiny]
extra_scripts = pre:copy_firmware.py
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
build_flags = -DAPP_VERSION=0.4
lib_deps =
    WS281xProcessor= https://github.com/Jueff/WS281xProcessor.git#v1.0.0
    MobaLedLib=      https://github.com/Hardi-St/MobaLedLib#longInpAddresses
    PicoFlashStorage=https://github.com/Jueff/PicoFlashStorage.git#v1.0.0
    MLLServoConfigurator=https://github.com/Jueff/MLLServoConfigurator#v0.1.0
    SoftwareSerialTx@=0.1.0
    RP2040_PWM @ 1.7.0